services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3009:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5009/api}
    volumes:
      - frontend_next_cache:/app/.next/cache
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5009:5000"
    environment:
      - FLASK_ENV=development
      - CORS_ORIGINS=http://localhost:3009
    volumes:
      - backend_pycache:/app/__pycache__

volumes:
  frontend_next_cache:
  backend_pycache:
