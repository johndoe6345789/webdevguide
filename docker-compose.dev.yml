services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3456:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5679/api}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5679:5000"
    environment:
      - FLASK_ENV=development
      - CORS_ORIGINS=http://localhost:3456
