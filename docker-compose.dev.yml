services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "9134:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:6823/api}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "6823:5000"
    environment:
      - FLASK_ENV=development
      - CORS_ORIGINS=http://localhost:9134
