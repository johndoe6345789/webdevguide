services:
  nginx:
    image: nginx:alpine
    ports:
      - "8743:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    volumes:
      - frontend_next_cache:/app/.next/cache
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "7291:5000"
    environment:
      - FLASK_ENV=production
      - CORS_ORIGINS=*
    volumes:
      - backend_pycache:/app/__pycache__

volumes:
  frontend_next_cache:
  backend_pycache:
