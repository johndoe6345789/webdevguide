services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8743:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:7291/api}
    volumes:
      - frontend_next_cache:/app/.next/cache
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "7291:5000"
    environment:
      - FLASK_ENV=production
      - CORS_ORIGINS=http://localhost:8743
    volumes:
      - backend_pycache:/app/__pycache__

volumes:
  frontend_next_cache:
  backend_pycache:
